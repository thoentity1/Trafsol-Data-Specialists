<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <!-- Link to shared CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 class="title">Your Cart</h1>

    <div class="cart-item">
        <span>Product 1</span>
        <span>R500</span>
    </div>

    <div class="cart-item">
        <span>Product 2</span>
        <span>R300</span>
    </div>

    <div class="cart-item">
        <span>Product 3</span>
        <span>R200</span>
    </div>

    <div class="total">
        Total: R1000
    </div>

    <button class="btn" onclick="checkout()">
        Checkout via WhatsApp
    </button>
</div>

<script>
function checkout() {
    let message = "Hello, I would like to order:\n";
    message += "- Product 1 (R500)\n";
    message += "- Product 2 (R300)\n";
    message += "- Product 3 (R200)\n";
    message += "Total: R1000";

    let phone = "27812345678";
    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
</html>

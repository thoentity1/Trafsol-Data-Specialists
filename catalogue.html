<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catalogue – Trafsol Data Specialists</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- EXTERNAL CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav>
  
  <nav>
  <h2 style="color:#22d3ee;">Trafsol Data Specialists</h2>

  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="catalogue.html">Catalogue</a></li>
    <li><a href="cart.html">Cart</a></li>
  </ul>

  <div>
    <a href="cart.html" class="btn btn-outline">
      🛒 (<span id="cart-count">0</span>)
    </a>
  </div>
</nav>

  <div>
    <a href="cart.html" class="cart">🛒 Cart (<span id="cart-count">0</span>)</a>
    <button id="clear-cart" class="button">Clear</button>
  </div>
</nav>

<!-- TITLE -->
<h2 class="section-heading">Data Packs</h2>
<div class="product-grid" id="sensual-grid"></div>

<h2 class="section-heading">Analytics Boxes</h2>
<div class="product-grid" id="breakup-grid"></div>

<h2 class="section-heading">Data Specials</h2>
<div class="product-grid" id="dom-grid"></div>

<script>
const slideIndices = {};

// CAROUSEL
function changeSlide(group, n) {
  const carousel = document.querySelector(`.carousel[data-group="${group}"]`);
  const images = carousel.querySelectorAll('img');

  if (!slideIndices[group]) slideIndices[group] = 0;

  slideIndices[group] = (slideIndices[group] + n + images.length) % images.length;

  images.forEach((img, i) => {
    img.classList.toggle('active', i === slideIndices[group]);
  });
}

// CART COUNT
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem('cartItems') || '[]');
  document.getElementById('cart-count').textContent = cart.length;
}

// ADD TO CART
function addToCart(name, price) {
  const cart = JSON.parse(localStorage.getItem('cartItems') || '[]');
  cart.push({ name, price });
  localStorage.setItem('cartItems', JSON.stringify(cart));
  updateCartCount();
  alert(name + " added to cart!");
}

// LOAD PAGE
document.addEventListener('DOMContentLoaded', () => {

  updateCartCount();

  const products = [
    { group: 1, name: "Data Analysis", desc: "Transform raw data into insights.", price: "2500", images: ["1.jpg","2.jpg","3.jpg"] },
    { group: 2, name: "Business Intelligence", desc: "Dashboards with Power BI/Tableau.", price: "6500", images: ["1.jpg","2.jpg","3.jpg"] },
    { group: 3, name: "Predictive Analytics", desc: "AI-powered forecasting models.", price: "12000", images: ["1.jpg","2.jpg","3.jpg"] },

    { group: 4, name: "Data Engineering", desc: "Build scalable pipelines.", price: "5000", images: ["1.jpg","2.jpg","3.jpg"] },
    { group: 5, name: "Automation Systems", desc: "Automate workflows.", price: "4000", images: ["1.jpg","2.jpg","3.jpg"] },
    { group: 6, name: "Reporting Tools", desc: "Custom business reports.", price: "3000", images: ["1.jpg","2.jpg","3.jpg"] },

    { group: 7, name: "Starter Pack", desc: "Basic analytics setup.", price: "2000", images: ["1.jpg","2.jpg","3.jpg"] },
    { group: 8, name: "Pro Pack", desc: "Advanced analytics + dashboards.", price: "8000", images: ["1.jpg","2.jpg","3.jpg"] },
    { group: 9, name: "Enterprise Pack", desc: "Full data solution suite.", price: "15000", images: ["1.jpg","2.jpg","3.jpg"] },
  ];

  const grids = {
    1: document.getElementById('sensual-grid'),
    2: document.getElementById('sensual-grid'),
    3: document.getElementById('sensual-grid'),

    4: document.getElementById('breakup-grid'),
    5: document.getElementById('breakup-grid'),
    6: document.getElementById('breakup-grid'),

    7: document.getElementById('dom-grid'),
    8: document.getElementById('dom-grid'),
    9: document.getElementById('dom-grid')
  };

  products.forEach(prod => {

    const images = prod.images.map((img, i) =>
      `<img src="images/${img}" class="${i === 0 ? 'active' : ''}">`
    ).join('');

    const card = document.createElement('div');
    card.className = 'product-card';

    card.innerHTML = `
      <div class="carousel" data-group="${prod.group}">
        ${images}
        <span class="prev" onclick="changeSlide(${prod.group}, -1)">❮</span>
        <span class="next" onclick="changeSlide(${prod.group}, 1)">❯</span>
      </div>

      <h3>${prod.name}</h3>
      <p>${prod.desc}</p>
      <div class="price">From R${prod.price}</div>

      <button class="button" onclick="addToCart('${prod.name}', '${prod.price}')">
        Add to cart
      </button>
    `;

    grids[prod.group].appendChild(card);
  });

  // CLEAR CART
  document.getElementById('clear-cart').addEventListener('click', () => {
    localStorage.removeItem('cartItems');
    updateCartCount();
    alert("Cart cleared");
  });

});
</script>

</body>
</html>

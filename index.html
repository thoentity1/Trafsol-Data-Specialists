<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="ohTPOQhtG21Lc2esohMJKY0FlAuwQliTP24Ihj78hAg" />

<!-- Google Verification -->
<meta name="google-site-verification" content="" />

<!-- SEO -->
<title>Trafsol Data Specialists | Data Analytics & Digital Intelligence</title>

<meta name="description" content="Trafsol Data Specialists delivers advanced data analytics, business intelligence, and digital solutions to help companies make smarter decisions and grow faster.">

<meta name="keywords" content="data analytics South Africa, business intelligence, data specialists, dashboards, AI solutions, Trafsol">

<!-- Open Graph (Social Sharing) -->
<meta property="og:title" content="Trafsol Data Specialists">
<meta property="og:description" content="Transform your data into powerful business decisions.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yourgithubusername.github.io/Trafsol/">

<!-- Favicon (optional) -->
<link rel="icon" href="trafsol_logo.png">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg, #020617, #0f172a);
  font-family: Arial, sans-serif;
  color:#fff;
  text-align:center;
}

/* Logo */
img{
  width:260px;
  cursor:pointer;
  transition:0.3s;
}
img:hover{
  transform:scale(1.05);
}

/* Button */
a{
  margin-top:20px;
  padding:12px 25px;
  background:#22C06D4;
  color:#000;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
  transition:0.3s;
}
a:hover{
  background:#22d3ee;
}

/* Subtitle */
p{
  margin-top:15px;
  font-size:14px;
  color:#94a3b8;
}
</style>

<script>
// Disable right click
document.addEventListener("contextmenu", function(e){
  e.preventDefault();
});

// Disable key shortcuts
document.addEventListener("keydown", function(e){
  if (
    e.keyCode == 123 || // F12
    (e.ctrlKey && e.shiftKey && e.keyCode == 73) || // Ctrl+Shift+I
    (e.ctrlKey && e.keyCode == 85) || // Ctrl+U
    (e.ctrlKey && e.shiftKey && e.keyCode == 74) // Ctrl+Shift+J
  ) {
    e.preventDefault();
  }
});
</script>

</head>

<body>

<!-- Logo -->
<img src="trafsol_logo.png"
onclick="window.location.href='home.html'"
alt="Trafsol Data Specialists Logo">

<!-- Tagline -->
<p>Data • Intelligence • Growth</p>

<!-- Enter Button -->
<a href="home.html">Enter Platform</a>

</body>
</html>
